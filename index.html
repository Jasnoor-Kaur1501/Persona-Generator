<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherMood</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f13;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --text: #f2f0ec;
  --muted: rgba(242,240,236,0.45);
  --accent: #f2f0ec;
  --glow: rgba(255,255,255,0.06);
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  transition: background 1.2s ease;
  position: relative;
  overflow: hidden;
}
/* animated bg orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0;
  transition: all 1.5s ease;
  pointer-events: none;
  z-index: 0;
}
.orb1 { width: 500px; height: 500px; top: -100px; left: -100px; }
.orb2 { width: 400px; height: 400px; bottom: -80px; right: -80px; }

.container {
  width: 100%;
  max-width: 480px;
  position: relative;
  z-index: 1;
}

/* HEADER */
.brand {
  text-align: center;
  margin-bottom: 40px;
}
.brand h1 {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 400;
  letter-spacing: -1px;
  color: var(--text);
}
.brand p {
  font-size: 13px;
  color: var(--muted);
  margin-top: 6px;
  letter-spacing: 0.04em;
}

/* SEARCH */
.search-wrap {
  display: flex;
  gap: 10px;
  margin-bottom: 32px;
}

.search-wrap input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  padding: 14px 18px;
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap input:focus { border-color: rgba(255,255,255,0.25); }

.search-wrap button {
  background: var(--text);
  border: none;
  border-radius: 12px;
  color: #0f0f13;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  padding: 14px 22px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  white-space: nowrap;
}
.search-wrap button:hover { opacity: 0.88; }
.search-wrap button:active { transform: scale(0.97); }

/* CARD */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  backdrop-filter: blur(20px);
  display: none;
  animation: fadeUp 0.5s ease forwards;
}
.card.visible { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.city-name {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.temp-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 24px;
}

.temp {
  font-family: 'Playfair Display', serif;
  font-size: 80px;
  font-weight: 400;
  line-height: 1;
  letter-spacing: -3px;
}

.weather-icon {
  font-size: 52px;
  line-height: 1;
  margin-top: 6px;
}

.weather-desc {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 28px;
  text-transform: capitalize;
}

/* VIBE */
.vibe-block {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 24px;
}

.vibe-label {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

.vibe-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-style: italic;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.3;
}

.vibe-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.65;
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.stat {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
}

.stat-val {
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 4px;
}

.stat-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.05em;
}

/* ERROR */
.error {
  text-align: center;
  padding: 20px;
  color: var(--muted);
  font-size: 14px;
  display: none;
}
.error.visible { display: block; }

/* LOADING */
.loading {
  text-align: center;
  padding: 20px;
  color: var(--muted);
  font-size: 14px;
  display: none;
  letter-spacing: 0.05em;
}
.loading.visible { display: block; }

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 32px;
  font-size: 12px;
  color: rgba(242,240,236,0.2);
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

<div class="orb orb1" id="orb1"></div>
<div class="orb orb2" id="orb2"></div>

<div class="container">
  <div class="brand">
    <h1>WeatherMood</h1>
    <p>real weather. real vibes.</p>
  </div>

  <div class="search-wrap">
    <input type="text" id="cityInput" placeholder="Enter a city..." autocomplete="off" />
    <button onclick="getWeather()">Check vibe</button>
  </div>

  <div class="loading" id="loading">reading the atmosphere...</div>
  <div class="error" id="error">Couldn't find that city. Try again?</div>

  <div class="card" id="card">
    <div class="city-name" id="cityLabel"></div>
    <div class="temp-row">
      <div class="temp" id="temp"></div>
      <div class="weather-icon" id="icon"></div>
    </div>
    <div class="weather-desc" id="desc"></div>

    <div class="vibe-block">
      <div class="vibe-label">today's vibe</div>
      <div class="vibe-title" id="vibeTitle"></div>
      <div class="vibe-desc" id="vibeDesc"></div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="humidity"></div>
        <div class="stat-label">Humidity</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="wind"></div>
        <div class="stat-label">Wind</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="feels"></div>
        <div class="stat-label">Feels like</div>
      </div>
    </div>
  </div>

  <div class="footer">powered by open-meteo · no api key needed</div>
</div>

<script>
const VIBES = {
  sunny_hot: {
    title: "main character summer energy",
    desc: "The kind of day that makes you want to eat mango outside and pretend you're in a movie. Peak golden hour potential. Don't waste it.",
    orb1: "#ff9f43", orb2: "#f9ca24"
  },
  sunny_warm: {
    title: "golden hour all day",
    desc: "Warm enough to feel alive, cool enough to actually function. Genuinely the best weather exists. Step outside at least once.",
    orb1: "#f7b731", orb2: "#fa8231"
  },
  sunny_cool: {
    title: "crisp and clear era",
    desc: "Sunshine but make it wearable. Perfect conditions for doing the thing you've been putting off. No excuses today.",
    orb1: "#a29bfe", orb2: "#74b9ff"
  },
  cloudy_warm: {

    desc: "No harsh shadows, no glare — just even, moody light that makes everything look cinematic. Great for thinking deeply.",
    orb1: "#b2bec3", orb2: "#636e72"
  },
  cloudy_cool: {
    title: "cozy blanket weather",
    desc: "The sky is giving thoughtful. Ideal for hot drinks, slow mornings, and pretending you're in a slow European film.",
    orb1: "#74b9ff", orb2: "#a29bfe"
  },
  rainy_warm: {

    desc: "Rain when it's warm hits different — everything smells electric and alive. Perfect excuse to stay in and actually be productive.",
    orb1: "#00cec9", orb2: "#0984e3"
  },
  rainy_cold: {
    title: "full melancholy mode activated",
    desc: "Cold rain is nature telling you to make soup, light a candle, and do something introspective. You have permission to be dramatic today.",

  foggy: {

  default: {
    title: "undefined atmospheric energy",
    desc: "The weather is doing something. You're witnessing it. That's enough.",
    orb1: "#6c5ce7", orb2: "#a29bfe"
  }
};
